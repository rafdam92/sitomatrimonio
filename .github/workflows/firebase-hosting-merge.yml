</section>

<div class="cd-section">
  <p class="cd-top">Al grande giorno mancano</p>
  <div id="cd-wrap">
    <div class="cd-unit"><span class="cd-num" id="cd-d">000</span><span class="cd-lbl">Giorni</span></div>
    <span class="cd-sep">·</span>
