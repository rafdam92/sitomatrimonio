<section class="hero">
  <svg class="hero-flower hero-flower--tl" viewBox="0 0 260 260" fill="none">
    <ellipse cx="130" cy="80" rx="22" ry="38" fill="#F3B9C6" opacity=".6" transform="rotate(0 130 130)"/>
    <ellipse cx="130" cy="80" rx="22" ry="38" fill="#F0B888" opacity=".5" transform="rotate(51 130 130)"/>
    <ellipse cx="130" cy="80" rx="22" ry="38" fill="#F5DFA0" opacity=".5" transform="rotate(102 130 130)"/>
