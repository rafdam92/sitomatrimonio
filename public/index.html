<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Damiano & Francesca — 24 Luglio 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --milk:  #FEFCF8;
  --petal: #F2D9D0;
  --rose:  #E8C4B8;
  --mauve: #C9A8C0;
  --sage:  #9BAF8E;
  --ink:   #2C2420;
  --mid:   #7A6A64;
  --fd: 'Playfair Display', Georgia, serif;
  --fb: 'DM Sans', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background: var(--milk);
  font-family: var(--fb);
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem 5rem;
  position: relative;
  overflow: hidden;
}

/* background glow */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(242,217,208,.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(201,160,192,.28) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 40%, rgba(155,175,142,.14) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* corner flowers */
.flower { position: fixed; pointer-events: none; z-index: 0; }
.flower-tl { top: -40px; left: -40px; width: 320px; opacity: .18; transform: rotate(-15deg); }
.flower-br { bottom: -40px; right: -40px; width: 280px; opacity: .18; transform: rotate(165deg); }
.flower-tr { top: -20px; right: -20px; width: 220px; opacity: .13; transform: rotate(80deg); }
.flower-bl { bottom: -20px; left: -20px; width: 200px; opacity: .13; transform: rotate(260deg); }

/* main card */
.card {
  position: relative; z-index: 1;
  max-width: 440px; width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.top-tag {
  font-size: .58rem;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 2rem;
}

.names {
  font-family: var(--fd);
  font-style: italic;
  font-size: clamp(2.2rem, 5vw, 3rem);
  line-height: 1.2;
  color: var(--ink);
}
.names .amp {
  display: block;
  font-size: .7em;
  color: var(--mauve);
  margin: .08em 0;
}

.petal-rule {
  display: flex; align-items: center; gap: 1rem;
  width: 160px;
  margin: 1.6rem 0;
}
.petal-rule::before,.petal-rule::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, var(--rose), transparent);
}
.petal-rule span { font-size: .95rem; }

.date {
  font-family: var(--fd);
  font-size: 1rem;
  letter-spacing: .2em;
  color: var(--mid);
  margin-bottom: .4rem;
}
.location {
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 2rem;
}

.coming-soon {
  font-size: .82rem;
  color: var(--mid);
  line-height: 1.85;
  margin-bottom: 2.2rem;
}
.coming-soon em {
  font-family: var(--fd);
  font-style: italic;
  font-size: 1.1em;
  color: var(--mauve);
}

/* countdown */
.mini-cd {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-bottom: 0;
  flex-wrap: wrap;
}
.mini-cd-unit {
  display: flex; flex-direction: column; align-items: center; gap: .35rem;
  min-width: 48px;
}
.mini-cd-num {
  font-family: var(--fd);
  font-size: 2.2rem;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
  text-align: center;
  min-width: 2.5ch;
}
.mini-cd-lbl {
  font-size: .5rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--mid);
}

/* secret trigger — visible flower at bottom */
.secret-area {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .8rem;
}
.secret-trigger {
  font-size: 1.6rem;
  cursor: pointer;
  opacity: .35;
  transition: opacity .3s, transform .3s;
  background: none;
  border: none;
  padding: .4rem;
  line-height: 1;
}
.secret-trigger:hover { opacity: .7; transform: scale(1.15); }

.secret-form {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: .7rem;
  background: rgba(254,252,248,.95);
  padding: 1.2rem 1.5rem;
  border: 1px solid rgba(201,160,192,.3);
  backdrop-filter: blur(8px);
}
.secret-form.visible { display: flex; }

.secret-input {
  width: 200px;
  padding: .65rem 1rem;
  border: 1px solid rgba(201,160,192,.4);
  background: transparent;
  font-family: var(--fb);
  font-size: .88rem;
  color: var(--ink);
  text-align: center;
  border-radius: 0;
  outline: none;
  transition: border-color .2s;
}
.secret-input:focus { border-color: var(--mauve); }
.secret-input::placeholder { color: rgba(122,106,100,.4); }

.secret-btn {
  padding: .55rem 1.6rem;
  background: linear-gradient(135deg, var(--mauve), var(--rose));
  color: var(--milk);
  border: none; cursor: pointer;
  font-family: var(--fb);
  font-size: .6rem;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  transition: opacity .2s;
}
.secret-btn:hover { opacity: .88; }
.secret-err { font-size: .68rem; color: #c0392b; display: none; }
</style>
</head>
<body>

<!-- corner flowers -->
<svg class="flower flower-tl" viewBox="0 0 260 260" fill="none">
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#E8C4B8" opacity=".7" transform="rotate(0 130 130)"/>
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#C9A8C0" opacity=".6" transform="rotate(45 130 130)"/>
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#9BAF8E" opacity=".5" transform="rotate(90 130 130)"/>
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#E8C4B8" opacity=".6" transform="rotate(135 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#C9A8C0" opacity=".4" transform="rotate(22 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#9BAF8E" opacity=".4" transform="rotate(67 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#F2D9D0" opacity=".5" transform="rotate(112 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#E8C4B8" opacity=".4" transform="rotate(157 130 130)"/>
  <circle cx="130" cy="130" r="14" fill="#F2D9D0" opacity=".9"/>
  <circle cx="130" cy="130" r="7" fill="#C9A8C0"/>
</svg>
<svg class="flower flower-br" viewBox="0 0 260 260" fill="none">
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#C9A8C0" opacity=".7" transform="rotate(0 130 130)"/>
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#9BAF8E" opacity=".6" transform="rotate(45 130 130)"/>
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#E8C4B8" opacity=".5" transform="rotate(90 130 130)"/>
  <ellipse cx="130" cy="80" rx="22" ry="38" fill="#F2D9D0" opacity=".6" transform="rotate(135 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#E8C4B8" opacity=".4" transform="rotate(22 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#C9A8C0" opacity=".4" transform="rotate(67 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#9BAF8E" opacity=".5" transform="rotate(112 130 130)"/>
  <ellipse cx="130" cy="80" rx="18" ry="32" fill="#F2D9D0" opacity=".4" transform="rotate(157 130 130)"/>
  <circle cx="130" cy="130" r="14" fill="#F2D9D0" opacity=".9"/>
  <circle cx="130" cy="130" r="7" fill="#E8C4B8"/>
</svg>
<svg class="flower flower-tr" viewBox="0 0 200 200" fill="none">
  <ellipse cx="100" cy="60" rx="16" ry="28" fill="#9BAF8E" opacity=".6" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="60" rx="16" ry="28" fill="#E8C4B8" opacity=".5" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="60" rx="16" ry="28" fill="#C9A8C0" opacity=".5" transform="rotate(120 100 100)"/>
  <circle cx="100" cy="100" r="10" fill="#F2D9D0" opacity=".9"/>
</svg>
<svg class="flower flower-bl" viewBox="0 0 200 200" fill="none">
  <ellipse cx="100" cy="60" rx="16" ry="28" fill="#E8C4B8" opacity=".6" transform="rotate(0 100 100)"/>
  <ellipse cx="100" cy="60" rx="16" ry="28" fill="#C9A8C0" opacity=".5" transform="rotate(60 100 100)"/>
  <ellipse cx="100" cy="60" rx="16" ry="28" fill="#9BAF8E" opacity=".5" transform="rotate(120 100 100)"/>
  <circle cx="100" cy="100" r="10" fill="#F2D9D0" opacity=".9"/>
</svg>

<!-- content -->
<div class="card">
  <span class="top-tag">Sito in allestimento</span>

  <h1 class="names">
    Damiano
    <span class="amp">&amp;</span>
    Francesca
  </h1>

  <div class="petal-rule"><span>🌸</span></div>

  <p class="date">24 &middot; VII &middot; 2027</p>
  <p class="location">Comiso &mdash; Ispica &middot; Sicilia</p>

  <p class="coming-soon">
    Il nostro sito è quasi pronto.<br>
    <em>Torna presto per scoprire tutti i dettagli!</em>
  </p>

  <div class="mini-cd">
    <div class="mini-cd-unit"><span class="mini-cd-num" id="cd-d">000</span><span class="mini-cd-lbl">Giorni</span></div>
    <div class="mini-cd-unit"><span class="mini-cd-num" id="cd-h">00</span><span class="mini-cd-lbl">Ore</span></div>
    <div class="mini-cd-unit"><span class="mini-cd-num" id="cd-m">00</span><span class="mini-cd-lbl">Minuti</span></div>
    <div class="mini-cd-unit"><span class="mini-cd-num" id="cd-s">00</span><span class="mini-cd-lbl">Secondi</span></div>
  </div>
</div>

<!-- secret flower fixed at bottom -->
<div class="secret-area">
  <button class="secret-trigger" id="secret-trigger" aria-label="accesso">🌸</button>
  <div class="secret-form" id="secret-form">
    <input class="secret-input" type="password" id="secret-input" placeholder="password" autocomplete="off"/>
    <button class="secret-btn" id="secret-btn">Entra</button>
    <span class="secret-err" id="secret-err">Password errata</span>
  </div>
</div>

<script>
// COUNTDOWN
(function(){
  const T = new Date('2027-07-24T11:00:00').getTime();
  const pad = (n,l=2) => String(n).padStart(l,'0');
  function tick(){
    const d = T - Date.now();
    if(d<=0) return;
    document.getElementById('cd-d').textContent = pad(Math.floor(d/86400000),3);
    document.getElementById('cd-h').textContent = pad(Math.floor(d%86400000/3600000));
    document.getElementById('cd-m').textContent = pad(Math.floor(d%3600000/60000));
    document.getElementById('cd-s').textContent = pad(Math.floor(d%60000/1000));
  }
  tick(); setInterval(tick,1000);
})();

// SECRET — clicca 3 volte il fiore
const PASSWORD = 'damiano2027';
let clicks = 0;
document.getElementById('secret-trigger').addEventListener('click', () => {
  clicks++;
  if(clicks >= 3){
    document.getElementById('secret-form').classList.add('visible');
    document.getElementById('secret-input').focus();
    clicks = 0;
  }
});
function tryEnter(){
  const val = document.getElementById('secret-input').value;
  if(val === PASSWORD){
    sessionStorage.setItem('preview','1');
    window.location.href = 'home.html';
  } else {
    document.getElementById('secret-err').style.display = 'block';
    document.getElementById('secret-input').value = '';
    document.getElementById('secret-input').focus();
  }
}
document.getElementById('secret-btn').addEventListener('click', tryEnter);
document.getElementById('secret-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') tryEnter();
  document.getElementById('secret-err').style.display = 'none';
});
if(sessionStorage.getItem('preview') === '1') window.location.href = 'home.html';
</script>
</body>
</html>
